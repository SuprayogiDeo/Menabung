<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, theme-color=#4f46e5">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tabungan">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Tabungan Bersama</title>
    
    <link rel="manifest" id="manifest-link">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgZmlsbD0iI2VlZjJmZiIvPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDEyOCwgMTI4KSBzY2FsZSgwLjUpIj48cGF0aCBmaWxsPSIjNGY0NmU1IiBkPSJNMjU2IDk2TDY0IDE5MnY0Mi42aDM4NFYxOTJMMjU2IDk2em0tMTQ5LjMgMTgxLjN2MTQ5LjRoNDIuNlYyNzcuM2gtNDIuNnptMTA2LjYgMHYxNDkuNGg0Mi42VjI3Ny4zaC00Mi42em0xMDYuNyAwdjE0OS40aDQyLjZWMjc3LjNIMzIwem0xMDYuNyAwdjE0OS40aDQyLjZWMjc3LjNoLTQyLjZ6TTY0IDQ2OS4zdjQyLjZoMzg0di00Mi42SDY0eiIvPjwvZz48L3N2Zz4=">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { premium: '#4f46e5', 'premium-dark': '#3b82f6' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; } 
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .app-container { max-width: 480px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }
        .toggle-checkbox:checked { right: 0; border-color: #4f46e5; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4f46e5; }
        .bg-premium-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); }
        .toast-visible { opacity: 1 !important; transform: translate(-50%, -20px) !important; }
        .celeb-ping { animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash { 0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; } 50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; } 100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; } }
        .spinner { animation: rotate 2s linear infinite; width: 1.25rem; height: 1.25rem; display: inline-block; vertical-align: middle; }
        .spinner .path { stroke: currentColor; stroke-linecap: round; animation: dash 1.5s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 transition-colors duration-300">

    <div class="app-container bg-slate-50 dark:bg-slate-900 shadow-2xl">
        
        <div id="splash-screen" class="fixed inset-0 z-[100] bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center transition-opacity duration-700 max-w-[480px] mx-auto overflow-hidden">
            <div class="relative w-32 h-32 flex justify-center items-center mb-8">
                <div class="absolute top-2 left-1 text-2xl drop-shadow-md">🪙</div>
                <div class="absolute top-10 right-0 text-xl drop-shadow-md">🪙</div>
                <div class="relative z-10 text-7xl drop-shadow-xl">💸</div>
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tighter">Tabungan Bersama</h1>
            <p class="text-xs font-bold text-slate-400 mt-2 tracking-widest uppercase">Menyiapkan Dompet...</p>
        </div>

        <div id="realtime-notif" class="fixed top-0 left-1/2 transform -translate-x-1/2 -translate-y-full w-[90%] max-w-[400px] bg-indigo-600 text-white p-4 rounded-2xl shadow-2xl z-[110] flex items-start gap-3 transition-transform duration-300">
            <div class="bg-white/20 p-2 rounded-full shrink-0"><i data-lucide="bell-ring" class="w-5 h-5 text-white"></i></div>
            <div>
                <p class="text-[10px] font-bold text-indigo-200 uppercase tracking-widest mb-0.5">Aktivitas Baru!</p>
                <p id="realtime-notif-text" class="text-sm font-black leading-tight">-</p>
            </div>
        </div>
        <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 translate-y-4 bg-slate-900 dark:bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl opacity-0 transition-all duration-300 z-[100] whitespace-nowrap pointer-events-none">Pesan</div>

        <main id="view-home" class="flex-1 overflow-y-auto no-scrollbar pb-24 hidden">
            <div class="px-6 pt-10 pb-4 bg-white dark:bg-slate-900 relative">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div id="home-avatar" class="w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold bg-indigo-100 text-indigo-700"></div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Selamat datang,</p>
                            <p id="home-username" class="font-extrabold text-slate-900 dark:text-white text-lg tracking-tight">-</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="px-6 pb-6 bg-white dark:bg-slate-900 rounded-b-[2.5rem] shadow-sm border-b dark:border-slate-800">
                <div class="bg-premium-gradient rounded-[2rem] p-6 text-white">
                    <p class="text-indigo-100 font-medium text-xs opacity-80 uppercase tracking-widest">Total Saldo</p>
                    <h1 id="total-balance" class="text-4xl font-black tracking-tight mb-4" data-value="0">Rp 0</h1>
                </div>
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-slate-900 dark:text-white">Tujuan Tabungan</h2>
                    <button onclick="window.switchView('view-create')" class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 p-2 rounded-full"><i data-lucide="plus"></i></button>
                </div>
                <div id="rooms-container" class="space-y-4"></div>
            </div>
        </main>

        <main id="view-detail" class="flex-1 overflow-y-auto no-scrollbar bg-slate-50 dark:bg-slate-950 hidden relative">
            <div class="sticky top-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md z-20 px-5 py-4 border-b flex items-center justify-between">
                <button onclick="window.history.back()" class="p-2 text-slate-600 dark:text-slate-400"><i data-lucide="chevron-left"></i></button>
                <h1 id="detail-title" class="font-bold text-lg dark:text-white">Detail</h1>
                <div class="w-10"></div>
            </div>
            <div class="px-8 pt-6 pb-2 text-center bg-white dark:bg-slate-900">
                <div id="member-pile-container" class="flex items-center justify-center -space-x-2 mb-3"></div>
                <button onclick="window.openMemberListModal()" class="px-5 py-2 bg-slate-50 dark:bg-slate-800 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5 mx-auto">
                    <span id="member-count-text">Lihat 0 Anggota</span> <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
                </button>
                <h2 id="detail-balance" class="text-4xl font-black text-slate-900 dark:text-white mt-4">Rp 0</h2>
            </div>
            <div class="p-6">
                <h3 class="font-black text-slate-900 dark:text-white mb-6 uppercase text-xs tracking-widest">Riwayat</h3>
                <div id="detail-history-list" class="relative border-l-2 border-indigo-100 ml-3 space-y-4 pb-4"></div>
            </div>
            <button onclick="window.openTransactionModal('nabung')" class="fixed bottom-6 right-6 z-40 bg-premium text-white p-4 rounded-full shadow-2xl"><i data-lucide="plus" class="w-7 h-7"></i></button>
        </main>

        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white dark:bg-slate-900 border-t px-6 py-3 flex justify-between items-center z-10 hidden">
            <button onclick="window.navigateTab('view-home', 'nav-home')" class="nav-btn flex-1 flex flex-col items-center gap-1 text-indigo-600" id="nav-home"><i data-lucide="home"></i><span class="text-[9px] font-black uppercase">Home</span></button>
            <button onclick="window.navigateTab('view-profile', 'nav-profile')" class="nav-btn flex-1 flex flex-col items-center gap-1 text-slate-300" id="nav-profile"><i data-lucide="user"></i><span class="text-[9px] font-black uppercase">Profil</span></button>
        </nav>

        <div id="modal-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[50] hidden" onclick="window.closeAllModals()"></div>

        <div id="modal-onboarding" class="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-white dark:bg-slate-900 max-w-[480px] mx-auto hidden transition-opacity">
            <div class="w-full text-center">
                <h2 class="text-3xl font-black dark:text-white mb-8">Tabungan Bersama</h2>
                <button onclick="window.loginWithGoogle()" class="w-full py-4 bg-white dark:bg-slate-800 border font-black rounded-2xl shadow-sm flex items-center justify-center gap-3">Masuk dengan Google</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // GLOBAL ERROR CATCHER
        window.addEventListener('error', function(e) { window.showToast("Error: " + e.message, true); });
        window.addEventListener('unhandledrejection', function(e) { window.showToast("Koneksi Error", true); });

        const firebaseConfig = {
            apiKey: "AIzaSyDUPTlI50-ZrTwokK9A9S7MJr5iCmqqyT4",
            authDomain: "tabungan-bersama-e48da.firebaseapp.com",
            projectId: "tabungan-bersama-e48da",
            storageBucket: "tabungan-bersama-e48da.firebasestorage.app",
            messagingSenderId: "984749032676",
            appId: "1:984749032676:web:eee0cff2200445e927d8f1"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const DB_KEY = 'tabungan_app_v1_release_final';
        let appData = JSON.parse(localStorage.getItem(DB_KEY)) || { user: '', uid: '', joinedRooms: [] };
        let globalRooms = [];
        let globalHistory = [];
        let currentRoomId = null;

        window.showToast = (msg, isError = false) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.className = `fixed bottom-24 left-1/2 transform -translate-x-1/2 translate-y-4 ${isError ? 'bg-rose-600' : 'bg-slate-900'} text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl opacity-0 transition-all duration-300 z-[100] toast-visible`;
            setTimeout(() => t.classList.remove('toast-visible'), 3000);
        };

        window.updateOnlineStatus = async (status) => {
            if (!appData.uid) return;
            try { await updateDoc(doc(db, "users", appData.uid), { isOnline: status, lastSeen: Date.now() }); } catch(e) {}
        };

        onAuthStateChanged(auth, async (user) => {
            const splash = document.getElementById('splash-screen');
            if (user) {
                appData.uid = user.uid;
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) {
                        const d = snap.data();
                        appData.user = d.name;
                        appData.joinedRooms = d.joinedRooms || [];
                        
                        // FIX: Perbaikan newSearchParams menjadi URLSearchParams
                        const urlParams = new URLSearchParams(window.location.search);
                        const sharedId = urlParams.get('id');
                        if(sharedId && !appData.joinedRooms.includes(sharedId)) { 
                            appData.joinedRooms.push(sharedId); 
                            await updateDoc(doc(db, "users", user.uid), { joinedRooms: appData.joinedRooms });
                        }

                        document.getElementById('view-home').classList.remove('hidden');
                        document.getElementById('bottom-nav').classList.remove('hidden');
                        window.updateOnlineStatus(true);
                        startRealtimeSync();
                    } else {
                        // Jika user baru, buat profil minimal
                        await setDoc(doc(db, "users", user.uid), { name: user.displayName, uid: user.uid, joinedRooms: [], isOnline: true, lastSeen: Date.now() });
                        location.reload();
                    }
                } catch(e) { window.showToast("Gagal muat data", true); }
            } else {
                document.getElementById('modal-onboarding').classList.remove('hidden');
            }
            if(splash) splash.classList.add('hidden');
        });

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { window.showToast("Gagal login", true); }
        };

        function startRealtimeSync() {
            onSnapshot(collection(db, "rooms"), (snap) => {
                globalRooms = [];
                snap.forEach(d => { if(appData.joinedRooms.includes(d.id)) globalRooms.push(d.data()); });
                updateUI();
            });
            onSnapshot(collection(db, "history"), (snap) => {
                globalHistory = [];
                snap.forEach(d => { if(appData.joinedRooms.includes(d.data().roomId)) globalHistory.push(d.data()); });
                globalHistory.sort((a,b) => b.timestamp - a.timestamp);
                updateUI();
            });
        }

        function updateUI() {
            const homeUser = document.getElementById('home-username');
            if(homeUser) homeUser.innerText = appData.user;
            const container = document.getElementById('rooms-container');
            if(!container) return;
            container.innerHTML = '';
            globalRooms.forEach(r => {
                container.innerHTML += `<div onclick="window.openRoomDetail('${r.id}')" class="p-6 bg-white dark:bg-slate-800 rounded-[2rem] shadow-sm border dark:border-slate-700">
                    <h3 class="font-black text-lg dark:text-white">${r.name}</h3>
                    <p class="text-2xl font-black mt-2 dark:text-white">Rp ${r.balance.toLocaleString('id-ID')}</p>
                </div>`;
            });
            try { lucide.createIcons(); } catch(e) {}
        }

        window.openRoomDetail = (id) => {
            currentRoomId = id;
            window.switchView('view-detail');
            const r = globalRooms.find(x => x.id === id);
            document.getElementById('detail-title').innerText = r.name;
            document.getElementById('detail-balance').innerText = 'Rp ' + r.balance.toLocaleString('id-ID');
            document.getElementById('member-count-text').innerText = `Lihat ${r.members.length} Anggota`;
        };

        window.switchView = (id) => {
            ['view-home', 'view-detail', 'view-profile'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');
        };

        window.navigateTab = (viewId, navId) => {
            window.switchView(viewId);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-300'));
            document.getElementById(navId).classList.replace('text-slate-300', 'text-indigo-600');
        };

        window.onload = () => { try { lucide.createIcons(); } catch(e) {} };
    </script>
</body>
</html>
